---
name: Setup Private Package Authentication
description: >
  Configures authentication for private mti-eng packages on GitHub.
  Covers git+https:// deps (pip and uv), and uv [tool.uv.sources] git deps
  via ~/.netrc.

inputs:
  token:
    description: PAT with read access to mti-eng private repos
    required: true

runs:
  using: composite
  steps:
    - name: Configure git credentials
      shell: bash
      run: |
        git config --global credential.helper store
        echo "https://x-access-token:${{ inputs.token }}@github.com" \
          >> ~/.git-credentials

    - name: Configure netrc
      shell: bash
      run: |
        # ~/.netrc is read natively by uv's HTTP client, pip, curl, and git.
        # This covers uv sync with [tool.uv.sources] entries and any direct
        # HTTPS fetch to github.com — paths the git credential helper does
        # not reach.
        CRED="machine github.com login x-access-token"
        echo "$CRED password ${{ inputs.token }}" >> ~/.netrc
        chmod 600 ~/.netrc
