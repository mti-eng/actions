---
name: Setup Private Package Authentication
description: >
  Configures authentication for private mti-eng packages on GitHub.
  Uses gh CLI as the git credential helper (covers pip, uv, and any
  git+https:// dependency) and ~/.netrc for uv's own HTTP client.

inputs:
  token:
    description: PAT with read access to mti-eng private repos
    required: true

runs:
  using: composite
  steps:
    - name: Configure git credential helper
      shell: bash
      run: |
        echo "${{ inputs.token }}" | gh auth login --with-token
        gh auth setup-git

    - name: Configure netrc
      shell: bash
      run: |
        CRED="machine github.com login x-access-token"
        echo "$CRED password ${{ inputs.token }}" >> ~/.netrc
        chmod 600 ~/.netrc
