---
name: "Install Dependencies"
description: >
  "Set up Python, optionally configure private package auth, and pip install"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  token:
    description: >-
      PAT with read access to mti-eng private repos
      (omit for public-only installs)
    required: false
    default: ""
  working-directory:
    description: "Directory to run pip install from"
    required: false
    default: "."
  extras:
    description: >-
      Extras group to install (e.g. dev, test); leave empty to
      install without extras
    required: false
    default: "dev"

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"

    - name: Configure private package auth
      if: ${{ inputs.token != '' }}
      uses: mti-eng/actions/setup-private-install@main
      with:
        token: ${{ inputs.token }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.extras }}" ]; then
          pip install -e ".[${{ inputs.extras }}]"
        else
          pip install -e .
        fi
