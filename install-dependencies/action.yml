---
name: Install Python Dependencies
description: >
  Installs Python project dependencies using uv or pip depending on
  whether a uv.lock file is present. uv is always used as the installer;
  pip-based projects benefit from faster resolution with no changes required.

inputs:
  python-version:
    description: Python version to set up
    required: false
    default: "3.11"
  extras:
    description: >
      Optional extras to install (e.g. "plotting" or "plotting,viz").
      Comma-separated for multiple extras. Corresponds to
      [project.optional-dependencies] in pyproject.toml.
      Leave empty (default) when dev tools are in [dependency-groups] —
      uv sync includes all dependency groups automatically.
    required: false
    default: ''
  working-directory:
    description: Directory containing pyproject.toml
    required: false
    default: '.'
  token:
    description: >
      PAT for private mti-eng package access. Leave empty if no private deps.
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: |
          **/uv.lock
          **/pyproject.toml
          **/requirements*.txt

    - name: Configure private package auth
      if: ${{ inputs.token != '' }}
      uses: mti-eng/actions/setup-private-install@main
      with:
        token: ${{ inputs.token }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f "uv.lock" ]; then
          echo "uv.lock detected — using uv sync --frozen"
          EXTRAS="${{ inputs.extras }}"
          if [ -n "$EXTRAS" ]; then
            # Split "dev,test" into --extra dev --extra test
            EXTRA_FLAGS=$(echo "$EXTRAS" | tr ',' '\n' \
              | sed 's/^/--extra /' | tr '\n' ' ')
            uv sync --frozen $EXTRA_FLAGS
          else
            uv sync --frozen
          fi
        else
          echo "No uv.lock - using uv pip install"
          uv venv
          if [ -n "${{ inputs.extras }}" ]; then
            uv pip install -e ".[${{ inputs.extras }}]"
          else
            uv pip install -e .
          fi
        fi
