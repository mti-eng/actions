# .github/workflows/python-ci.yml
name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.11"
      source-dir:
        required: false
        type: string
        default: "src"

      # --- opt-in flags ---
      run-black:
        required: false
        type: boolean
        default: true
      run-isort:
        required: false
        type: boolean
        default: true
      run-flake8:
        required: false
        type: boolean
        default: true
      run-pylint:
        required: false
        type: boolean
        default: false
      run-pytest:
        required: false
        type: boolean
        default: false
      run-precommit:
        required: false
        type: boolean
        default: false

      # --- per-tool config ---
      pylint-fail-under:
        required: false
        type: string
        default: "8.0"
      coverage-threshold:
        required: false
        type: string
        default: "80"
      precommit-check-versions:
        required: false
        type: boolean
        default: true
      precommit-check-files:
        required: false
        type: boolean
        default: false

jobs:

  format-black:
    name: "Format Check (black)"
    if: ${{ inputs.run-black }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mti-eng/actions/format-black@main
        with:
          python-version: ${{ inputs.python-version }}
          source-dir: ${{ inputs.source-dir }}

  format-isort:
    name: "Format Check (isort)"
    if: ${{ inputs.run-isort }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mti-eng/actions/format-isort@main
        with:
          python-version: ${{ inputs.python-version }}
          source-dir: ${{ inputs.source-dir }}

  lint-flake8:
    name: "Lint (flake8)"
    if: ${{ inputs.run-flake8 }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mti-eng/actions/lint-flake8@main
        with:
          python-version: ${{ inputs.python-version }}
          source-dir: ${{ inputs.source-dir }}

  lint-pylint:
    name: "Lint (pylint)"
    if: ${{ inputs.run-pylint }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mti-eng/actions/lint-pylint@main
        with:
          python-version: ${{ inputs.python-version }}
          source-dir: ${{ inputs.source-dir }}
          fail-under: ${{ inputs.pylint-fail-under }}

  format-pre-commit:
    name: "Pre-commit Check"
    if: ${{ inputs.run-precommit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: mti-eng/actions/format-pre-commit-check@main
        with:
          python-version: ${{ inputs.python-version }}
          check-precommit-versions: ${{ inputs.precommit-check-versions }}
          check-precommit-files: ${{ inputs.precommit-check-files }}


  test-pytest:
    name: "Test (pytest)"
    needs: [format-black, format-isort, lint-flake8, lint-pylint, format-pre-commit]
    if: >-
      ${{ always() && inputs.run-pytest &&
          !contains(needs.*.result, 'failure') &&
          !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup private package auth
        uses: mti-eng/actions/setup-private-install@main
        with:
          token: ${{ secrets.CI_TOKEN }}
      - uses: mti-eng/actions/test-pytest@main
        with:
          python-version: ${{ inputs.python-version }}
          coverage-threshold: ${{ inputs.coverage-threshold }}