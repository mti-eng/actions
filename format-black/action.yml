name: "Format Check (black)"
description: "Verify black formatting without modifying files"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  source-dir:
    description: "Directory to check"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"

    - name: Install black
      shell: bash
      run: pip install black

    - name: Check black
      shell: bash
      run: black --check ${{ inputs.source-dir }}
