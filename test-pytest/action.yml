name: "Test (pytest)"
description: "Run pytest with coverage"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  working-directory:
    description: "Working directory for test run"
    required: false
    default: "."
  coverage-threshold:
    description: "Minimum coverage percentage (0 to disable)"
    required: false
    default: "0"
  token:
    description: "PAT with read access to mti-eng private repos (omit for public-only installs)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      uses: mti-eng/actions/install-dependencies@main
      with:
        python-version: ${{ inputs.python-version }}
        working-directory: ${{ inputs.working-directory }}
        token: ${{ inputs.token }}

    - name: Run pytest
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pytest \
          --tb=short \
          --cov \
          --cov-report=term-missing \
          ${{ inputs.coverage-threshold != '0' && format('--cov-fail-under={0}', inputs.coverage-threshold) || '' }}