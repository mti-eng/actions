---
name: "Test (pytest)"
description: "Run pytest with coverage"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.11"
  working-directory:
    description: "Working directory for test run"
    required: false
    default: "."
  coverage-threshold:
    description: "Minimum coverage percentage (0 to disable)"
    required: false
    default: "0"
  token:
    description: >-
      PAT with read access to mti-eng private repos
      (omit for public-only installs)
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      uses: mti-eng/actions/install-dependencies@main
      with:
        python-version: ${{ inputs.python-version }}
        working-directory: ${{ inputs.working-directory }}
        token: ${{ inputs.token }}

    - name: Install pytest-cov
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pip install pytest pytest-cov

    - name: Run pytest
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        threshold="${{ inputs.coverage-threshold }}"
        cov_args=()
        if [ "$threshold" != "0" ]; then
          cov_args+=("--cov-fail-under=$threshold")
        fi
        pytest \
          --tb=short \
          --cov \
          --cov-report=term-missing \
          "${cov_args[@]}"
